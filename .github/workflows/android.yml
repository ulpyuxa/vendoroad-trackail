name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle
      run: ./gradlew assembleDebug --info 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

    - name: Print kapt error log on failure
      if: failure()
      run: |
        echo "=== 构建日志中的 kapt 错误 ==="
        grep -A 30 "kaptDebugKotlin\|error:\|KAPT\|annotation" build.log | head -200 || true
        echo "=== kapt 生成目录中的错误 ==="
        find app/build/tmp/kapt3 -name "*.log" -exec cat {} \; 2>/dev/null || true

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: trackail-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-log
        path: build.log

