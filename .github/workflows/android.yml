name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 将 GitHub Secrets 中存储的 Base64 keystore 解码为临时文件
    # 确保每次构建使用同一个签名，支持覆盖安装（不卸载直接升级）
    - name: 解码 Debug Keystore
      run: |
        echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/trackail-debug.jks

    - name: Build with Gradle
      run: ./gradlew assembleDebug --info 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
      env:
        # 将 keystore 路径和凭证通过环境变量注入 build.gradle.kts
        DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/trackail-debug.jks
        DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
        DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
        DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}

    - name: 构建失败时打印错误日志
      if: failure()
      run: |
        echo "=== 构建日志中的错误 ==="
        grep -A 30 "error:\|ERROR\|FAILED" build.log | head -200 || true

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: trackail-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-log
        path: build.log
