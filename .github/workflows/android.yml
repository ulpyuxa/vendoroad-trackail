name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

# 全局启用 Node.js 24，消除 Node.js 20 弃用告警
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────────────────────────
  # Job 1：构建 Debug APK（用于日常测试安装）
  # ────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4

      # 将 GitHub Secrets 中存储的 Base64 keystore 解码为临时文件
      # 确保每次构建使用同一个签名，支持覆盖安装（不卸载直接升级）
      - name: 解码 Debug Keystore
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > $RUNNER_TEMP/trackail-debug.jks

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --info 2>&1 | tee build-debug.log; exit ${PIPESTATUS[0]}
        env:
          DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/trackail-debug.jks
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}

      - name: 构建失败时打印错误日志
        if: failure()
        run: |
          echo "=== 构建日志中的错误 ==="
          grep -A 30 "error:\|ERROR\|FAILED" build-debug.log | head -200 || true

      - name: 上传 Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trackail-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: 构建失败时上传日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-failure-log
          path: build-debug.log

  # ─────────────────────────────────────────────────────────────────────
  # Job 2：构建 Release APK + Release AAB（用于正式发布 / 上架 Google Play）
  # ─────────────────────────────────────────────────────────────────────
  build-release:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4

      # 解码正式发布用的 Release Keystore
      # 需要在 GitHub Secrets 中配置：RELEASE_KEYSTORE_BASE64 / RELEASE_KEYSTORE_PASSWORD /
      # RELEASE_KEY_ALIAS / RELEASE_KEY_PASSWORD
      - name: 解码 Release Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > $RUNNER_TEMP/trackail-release.jks

      - name: 构建 Release APK
        run: ./gradlew assembleRelease --info 2>&1 | tee build-release.log; exit ${PIPESTATUS[0]}
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/trackail-release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: 构建 Release AAB（用于上架 Google Play）
        run: ./gradlew bundleRelease --info 2>&1 | tee -a build-release.log; exit ${PIPESTATUS[0]}
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/trackail-release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: 构建失败时打印错误日志
        if: failure()
        run: |
          echo "=== 构建日志中的错误 ==="
          grep -A 30 "error:\|ERROR\|FAILED" build-release.log | head -200 || true

      - name: 上传 Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trackail-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: 上传 Release AAB（Google Play 上架用）
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trackail-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: 构建失败时上传日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-release-failure-log
          path: build-release.log
